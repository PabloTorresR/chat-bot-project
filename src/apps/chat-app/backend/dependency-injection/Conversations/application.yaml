services:
  Chatapp.Conversations.SearchConversationsByCriteriaQueryHandler:
    class: ../../../../../Contexts/Chatapp/Conversations/application/SearchByCriteria/SearchConversationsByCriteriaQueryHandler
    arguments: ['@Chatapp.Conversations.application.ConversationsByCriteriaSearcher']
    tags:
      - { name: 'queryHandler' }

  Chatapp.Conversations.application.ConversationsByCriteriaSearcher:
    class: ../../../../../Contexts/Chatapp/Conversations/application/SearchByCriteria/ConversationsByCriteriaSearcher
    arguments: ['@Chatapp.Conversations.domain.ConversationRepository']

  Chatapp.Conversations.domain.ConversationRepository:
    class: ../../../../../Contexts/Chatapp/Conversations/infrastructure/persistence/mongo/MongoConversationRepository
    arguments: ['@Chatapp.Shared.ConnectionManager']

  Chatapp.Conversations.CreateConversationCommandHandler:
    class: ../../../../../Contexts/Chatapp/Conversations/application/Create/CreateConversationCommandHandler
    arguments: ['@Chatapp.Conversations.application.ConversationCreator']
    tags:
      - { name: 'commandHandler' }

  Chatapp.Conversations.application.ConversationCreator:
    class: ../../../../../Contexts/Chatapp/Conversations/application/Create/ConversationCreator
    arguments: ['@Chatapp.Conversations.domain.ConversationRepository', '@Chatapp.Shared.domain.EventBus']
